version: 2

models:
  - name: int_velib_meteo
    description: >
      Jointure Vélib' + météo avec appariement temporel ±15 min.
      Chaque ligne représente un snapshot de station active avec ses conditions
      météo les plus proches. Les stations inactives et les snapshots sans
      correspondance météo dans la fenêtre sont exclus.
    columns:
      - name: stationcode
        description: "Identifiant de la station"
        tests:
          - not_null
      - name: station_name
        description: "Nom lisible de la station"
      - name: commune
        description: "Nom de la commune ou de l'arrondissement parisien"
      - name: code_insee_commune
        description: "Code INSEE de la commune"
      - name: lat
        description: "Latitude WGS84 de la station"
      - name: lon
        description: "Longitude WGS84 de la station"
      - name: capacity
        description: "Capacité totale de la station (nombre de bornettes)"
      - name: docks_available
        description: "Nombre de bornettes libres"
      - name: bikes_available
        description: "Nombre total de vélos disponibles"
        tests:
          - not_null
      - name: mechanical
        description: "Nombre de vélos mécaniques disponibles"
      - name: ebike
        description: "Nombre de vélos électriques disponibles"
      - name: duedate
        description: "Horodatage du snapshot Vélib'"
        tests:
          - not_null
      - name: meteo_measured_at
        description: "Horodatage de la mesure météo appariée (écart max ±15 min)"
        tests:
          - not_null
      - name: temperature_2m
        description: "Température à 2m (°C)"
      - name: humidity
        description: "Humidité relative à 2m (%)"
      - name: apparent_temperature
        description: "Température ressentie (°C)"
      - name: is_day
        description: "1 si mesure de jour, 0 si nuit"
      - name: precipitation
        description: "Précipitations totales en mm"
      - name: rain
        description: "Pluie en mm"
      - name: showers
        description: "Averses en mm"
      - name: snowfall
        description: "Chutes de neige en cm"
      - name: cloud_cover
        description: "Couverture nuageuse (%)"
      - name: wind_speed_10m
        description: "Vitesse du vent à 10m (km/h)"