version: 2

models:
  - name: fct_velib_meteo
    description: >
      Table marts matérialisée. Une ligne = un snapshot de station Vélib' active
      avec ses conditions météo appariées et ses features ML calculées.
      C'est la table lue par Streamlit et utilisée pour entraîner le RandomForest.
    columns:
      - name: stationcode
        description: "Identifiant de la station"
        tests:
          - not_null
      - name: station_name
        description: "Nom lisible de la station"
      - name: commune
        description: "Nom de la commune ou de l'arrondissement parisien"
      - name: code_insee_commune
        description: "Code INSEE de la commune"
      - name: lat
        description: "Latitude WGS84 de la station"
      - name: lon
        description: "Longitude WGS84 de la station"
      - name: capacity
        description: "Capacité totale de la station (nombre de bornettes)"
      - name: docks_available
        description: "Nombre de bornettes libres"
      - name: bikes_available
        description: "Nombre total de vélos disponibles"
      - name: mechanical
        description: "Nombre de vélos mécaniques disponibles"
      - name: ebike
        description: "Nombre de vélos électriques disponibles"
      - name: duedate
        description: "Horodatage du snapshot (heure locale Paris)"
        tests:
          - not_null
      - name: meteo_measured_at
        description: "Horodatage de la mesure météo appariée (heure locale Paris)"
      - name: hour_of_day
        description: "Heure locale Paris (0–23)"
      - name: day_of_week
        description: "Jour de la semaine (0=dimanche, 6=samedi)"
      - name: month
        description: "Mois de l'année (1–12)"
      - name: is_weekend
        description: "True si samedi ou dimanche"
      - name: temperature_2m
        description: "Température à 2m (°C)"
      - name: humidity
        description: "Humidité relative à 2m (%)"
      - name: apparent_temperature
        description: "Température ressentie (°C)"
      - name: is_day
        description: "1 si mesure de jour, 0 si nuit"
      - name: precipitation
        description: "Précipitations totales en mm"
      - name: rain
        description: "Pluie en mm"
      - name: showers
        description: "Averses en mm"
      - name: snowfall
        description: "Chutes de neige en cm"
      - name: cloud_cover
        description: "Couverture nuageuse (%)"
      - name: wind_speed_10m
        description: "Vitesse du vent à 10m (km/h)"
      - name: occupancy_rate
        description: "Taux de remplissage en vélos (bikes_available / capacity * 100), variable cible ML"