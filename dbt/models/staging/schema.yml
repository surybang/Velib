version: 2

models:
  - name: stg_velib
    description: "Stations Vélib' nettoyées et renommées (schéma bronze -> silver)"
    columns:
      - name: stationcode
        description: "Identifiant unique de la station"
        tests:
          - not_null
      - name: station_name
        description: "Nom lisible de la station"
      - name: capacity
        description: "Capacité totale de la station (nombre de bornettes)"
        tests:
          - not_null
      - name: docks_available
        description: "Nombre de bornettes libres"
      - name: bikes_available
        description: "Nombre total de vélos disponibles (mécaniques + électriques)"
      - name: mechanical
        description: "Nombre de vélos mécaniques disponibles"
      - name: ebike
        description: "Nombre de vélos électriques disponibles"
      - name: is_installed
        description: "True si la station est installée"
      - name: is_renting
        description: "True si la station accepte des locations"
      - name: duedate
        description: "Horodatage de la dernière mise à jour GBFS de la station"
        tests:
          - not_null
      - name: lon
        description: "Longitude WGS84 de la station"
      - name: lat
        description: "Latitude WGS84 de la station"
      - name: commune
        description: "Nom de la commune ou de l'arrondissement parisien"
      - name: code_insee_commune
        description: "Code INSEE de la commune"

  - name: stg_meteo
    description: "Mesures météo Paris nettoyées (schéma bronze -> silver)"
    columns:
      - name: measured_at
        description: "Horodatage de la mesure météo"
        tests:
          - not_null
          - unique
      - name: temperature_2m
        description: "Température à 2m (°C)"
      - name: humidity
        description: "Humidité relative à 2m (%)"
      - name: apparent_temperature
        description: "Température ressentie (°C)"
      - name: is_day
        description: "1 si mesure de jour, 0 si nuit"
      - name: precipitation
        description: "Précipitations totales en mm"
      - name: rain
        description: "Pluie en mm"
      - name: showers
        description: "Averses en mm"
      - name: snowfall
        description: "Chutes de neige en cm"
      - name: cloud_cover
        description: "Couverture nuageuse (%)"
      - name: wind_speed_10m
        description: "Vitesse du vent à 10m (km/h)"